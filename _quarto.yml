# IMPORTANT REFERENCE: https://www.youtube.com/watch?v=uimdXPZc40I&list=PLkrJrLs7xfbXcEKhTCKRSr2VXH4yiBeXo&index=4
project:
  type: website
  output-dir: docs
  # Render ONLY the public site pages + slide decks.
  # Instructor lecture guides (_lecture_guide/*.md) are deliberately EXCLUDED so
  # Quarto never compiles them into docs/ or indexes their text in search.json.
  render:
    - "*.qmd"
    - "lecture_slides/**/*.qmd"
  # Public course datasets — copied to docs/data/ so students can download them
  # from the Material and Schedule pages (raw data only; worked-solution workbooks
  # are kept out of the public site).
  resources:
    - "data/**"


